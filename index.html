<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vou Estudar+</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #f3f4f6;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 16px;
  width: 300px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg,#6366f1,#8b5cf6);
  color: white;
  cursor: pointer;
}

.msg {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Entrar</h2>

  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button id="loginBtn">Entrar</button>
  <button id="signupBtn">Criar conta</button>

  <div id="msg" class="msg"></div>
</div>

<script>
const SUPABASE_URL = "https://mcyzxwtpjoqioeqemrv.supabase.co";
const SUPABASE_KEY = "sb_publishable_G1DmNZdvjDl0-3N2onqD4Q_SZM1M6f1";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const msg = document.getElementById("msg");

function mostrar(msgText, cor="black"){
  msg.innerText = msgText;
  msg.style.color = cor;
}

document.getElementById("signupBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabase.auth.signUp({
    email,
    password: senha
  });

  if (error) return mostrar(error.message,"red");

  mostrar("Conta criada! Agora faça login.","green");
});

document.getElementById("loginBtn").addEventListener("click", async () => {
  mostrar("Entrando...");

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) return mostrar(error.message,"red");

  mostrar("Login realizado com sucesso!","green");

  // TESTE DE TROCA DE TELA
  setTimeout(()=>{
    document.body.innerHTML = "<h1 style='text-align:center'>Entrou no sistema 🚀</h1>";
  },1000);
});
</script>

</body>
</html>
