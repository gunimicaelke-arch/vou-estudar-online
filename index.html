<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans','Inter',sans-serif;background:#EEF3FB;color:#1a2744;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* BLOQUEIO DE ACESSO (FUNDO ESCURECIDO) */
.overlay-lead{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.55);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:20px;
}
.modal{
  background:#fff;
  width:100%;
  max-width:420px;
  border-radius:16px;
  padding:22px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  animation:pop .25s ease-out;
}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}

.modal h2{font-size:18px;margin-bottom:6px}
.modal p{font-size:13px;color:#64748b;margin-bottom:14px;line-height:1.5}

.modal input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #e2e8f0;
  font-family:inherit;
}

.modal button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#16a34a,#15803d);
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

.close-x{
  position:absolute;
  top:12px;right:14px;
  font-size:18px;
  cursor:pointer;
  color:#64748b;
}

/* SEU CSS ORIGINAL (NÃO ALTERADO VISUALMENTE) */
</style>
</head>

<body>

<!-- MODAL DE CAPTURA -->
<div class="overlay-lead" id="leadModal">
  <div class="modal">
    <div class="close-x" onclick="fecharModal()">×</div>
    <h2>Receba seu plano no WhatsApp</h2>
    <p>Digite seus dados para liberar o acesso e receber seu cronograma personalizado.</p>

    <input type="text" id="nome" placeholder="Seu nome">
    <input type="tel" id="whats" placeholder="Seu WhatsApp (DDD + número)">

    <button onclick="enviarLead()">QUERO MEU PLANO AGORA</button>
  </div>
</div>

<script>
function abrirModalLead(){
  document.getElementById('leadModal').style.display='flex';
}

function fecharModal(){
  document.getElementById('leadModal').style.display='none';
}

function enviarLead(){
  const nome = document.getElementById('nome').value;
  const whats = document.getElementById('whats').value;

  if(!nome || !whats){
    alert("Preencha seus dados");
    return;
  }

  const msg = `Olá! Meu nome é ${nome}. Quero meu plano de estudos.`;
  const url = `https://wa.me/55${whats}?text=${encodeURIComponent(msg)}`;

  window.open(url,'_blank');
  fecharModal();
}

/* BLOQUEIO INTELIGENTE: abre modal ao tentar CTA */
document.addEventListener("DOMContentLoaded", function(){
  const btns = document.querySelectorAll(".btn-hero-green, .btn-cta-gold, .nav-btn-gold");
  btns.forEach(b=>{
    b.addEventListener("click", function(e){
      e.preventDefault();
      abrirModalLead();
    });
  });
});
</script>

</body>
</html>
