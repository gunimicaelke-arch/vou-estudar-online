<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Vou Estudar+</title>
</head>
<body>

<h2>Cadastro</h2>
<input id="nome" placeholder="Nome"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="senha" type="password" placeholder="Senha"><br><br>
<button onclick="cadastrar()">Cadastrar</button>

<hr>

<h2>Login</h2>
<input id="emailLogin" placeholder="Email"><br><br>
<input id="senhaLogin" type="password" placeholder="Senha"><br><br>
<button onclick="login()">Entrar</button>

<hr>

<h2>Salvar matéria</h2>
<input id="materia" placeholder="Nome da matéria"><br><br>
<button onclick="salvar()">Salvar matéria</button>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://mcyzxwtpjoqiioeqemrv.supabase.co',
  'sb_publishable_G1DmNZdvjDl0-3N2onqD4Q_SZM1M6f1'
)

window.cadastrar = async () => {
  const nome = document.getElementById('nome').value
  const email = document.getElementById('email').value
  const senha = document.getElementById('senha').value

  const { data, error } = await supabase.auth.signUp({
    email,
    password: senha
  })

  if (error) return alert(error.message)

  await supabase.from("profiles").insert({
    id: data.user.id,
    nome,
    email
  })

  alert("Cadastro feito!")
}

window.login = async () => {
  const email = document.getElementById('emailLogin').value
  const senha = document.getElementById('senhaLogin').value

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password: senha
  })

  if (error) return alert(error.message)

  alert("Login OK!")
}

window.salvar = async () => {
  const materia = document.getElementById('materia').value

  const { data: userData } = await supabase.auth.getUser()

  const { error } = await supabase.from("materias").insert({
    user_id: userData.user.id,
    nome: materia
  })

  if (error) return alert(error.message)

  alert("Matéria salva!")
}
</script>

</body>
</html>
