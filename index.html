<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Vou Estudar+</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f5f5f5 }
.box { background:white; padding:15px; margin-bottom:15px; border-radius:10px }
button { padding:8px 12px; cursor:pointer }
input { padding:6px; margin:5px 0 }
</style>
</head>

<body>

<div id="auth" class="box">
<h2>Cadastro</h2>
<input id="nome" placeholder="Nome"><br>
<input id="email" placeholder="Email"><br>
<input id="senha" type="password" placeholder="Senha"><br>
<button onclick="cadastrar()">Cadastrar</button>

<hr>

<h2>Login</h2>
<input id="emailLogin" placeholder="Email"><br>
<input id="senhaLogin" type="password" placeholder="Senha"><br>
<button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">

<div class="box">
<h2>Matérias</h2>
<input id="materia" placeholder="Nome da matéria">
<button onclick="salvarMateria()">Salvar</button>
<ul id="lista"></ul>
</div>

<div class="box">
<h2>Timer de estudo</h2>
<button onclick="iniciar()">Iniciar</button>
<button onclick="parar()">Parar</button>
<p id="tempo">0 min</p>
</div>

<div class="box">
<h2>Gráfico</h2>
<canvas id="grafico"></canvas>
</div>

<div class="box">
<h2>IA - Plano de estudo</h2>
<button onclick="gerarIA()">Gerar plano</button>
<pre id="ia"></pre>
</div>

</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

// 🔥 SUA CONFIGURAÇÃO
const supabase = createClient(
'https://mcyzxwtpjoqiioeqemrv.supabase.co',
'sb_publishable_G1DmNZdvjDl0-3N2onqD4Q_SZM1M6f1'
)

let startTime = null
let chart

window.cadastrar = async () => {
const nome = document.getElementById('nome').value
const email = document.getElementById('email').value
const senha = document.getElementById('senha').value

const { data, error } = await supabase.auth.signUp({ email, password: senha })
if (error) return alert(error.message)

await supabase.from("profiles").insert({
id: data.user.id,
nome,
email
})

alert("Cadastro feito!")
}

window.login = async () => {
const email = document.getElementById('emailLogin').value
const senha = document.getElementById('senhaLogin').value

const { error } = await supabase.auth.signInWithPassword({ email, password: senha })
if (error) return alert(error.message)

document.getElementById('auth').style.display='none'
document.getElementById('app').style.display='block'

carregarMaterias()
carregarGrafico()
}

window.salvarMateria = async () => {
const materia = document.getElementById('materia').value
const { data:user } = await supabase.auth.getUser()

await supabase.from("subjects").insert({
user_id: user.user.id,
nome: materia
})

carregarMaterias()
}

async function carregarMaterias(){
const { data:user } = await supabase.auth.getUser()
const { data } = await supabase.from("subjects").select("*").eq("user_id", user.user.id)

const lista = document.getElementById('lista')
lista.innerHTML=''

data.forEach(m=>{
const li=document.createElement('li')
li.textContent=m.nome
lista.appendChild(li)
})
}

window.iniciar = () => {
startTime = Date.now()
}

window.parar = async () => {
const end = Date.now()
const minutos = Math.floor((end-startTime)/60000)
document.getElementById('tempo').innerText = minutos + " min"

const { data:user } = await supabase.auth.getUser()

await supabase.from("study_sessions").insert({
user_id: user.user.id,
subject_id:1,
duration_minutes: minutos
})

carregarGrafico()
}

async function carregarGrafico(){
const { data:user } = await supabase.auth.getUser()

const { data } = await supabase
.from("study_sessions")
.select("duration_minutes")

const total = data.map(d=>d.duration_minutes)

const ctx = document.getElementById('grafico')

if(chart) chart.destroy()

chart = new Chart(ctx,{
type:'bar',
data:{
labels: total.map((_,i)=>'Dia '+(i+1)),
datasets:[{
label:'Minutos estudados',
data: total
}]
}
})
}

window.gerarIA = async () => {
const res = await fetch('/api/ia',{
method:'POST',
headers:{'Content-Type':'application/json'},
body: JSON.stringify({texto:"Crie plano de estudo inteligente"})
})

const data = await res.json()
document.getElementById('ia').innerText = data.resposta
}

</script>
</body>
</html>
