<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: Arial; padding: 30px;">

  <h2>Teste de clique</h2>

  <input id="email" placeholder="Email" style="display:block; margin-bottom:10px; padding:10px; width:300px;">
  <input id="senha" type="password" placeholder="Senha" style="display:block; margin-bottom:10px; padding:10px; width:300px;">

  <button id="btnTeste" style="padding:10px 20px;">Testar clique</button>

  <p id="msg"></p>

  <script>
    alert("SCRIPT CARREGOU");

    const SUPABASE_URL = "https://mcyzxwtpjoqioeqemrv.supabase.co";
    const SUPABASE_KEY = "sb_publishable_G1DmNZdvjDl0-3N2onqD4Q_SZM1M6f1";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById("btnTeste").addEventListener("click", async () => {
      alert("BOTÃO CLICOU");

      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password: senha
      });

      if (error) {
        document.getElementById("msg").innerText = "ERRO: " + error.message;
        return;
      }

      document.getElementById("msg").innerText = "LOGIN OK: " + data.user.email;
    });
  </script>
</body>
</html>
