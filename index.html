<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vou Estudar+ Online</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#f6f7fc;
      --sidebar:#f0f1fb;
      --card:#ffffff;
      --line:#e6e9f5;
      --text:#202634;
      --muted:#6f7890;
      --primary:#5863f8;
      --primary-2:#7882ff;
      --green:#29b36a;
      --orange:#f3b33d;
      --red:#ff6b6b;
      --blue-soft:#eef1ff;
      --green-soft:#eaf8ef;
      --orange-soft:#fff4df;
      --red-soft:#fff0f0;
      --shadow:0 10px 28px rgba(22,29,45,0.06);
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .hidden { display: none !important; }

    .center {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login-shell {
      width: 100%;
      max-width: 1180px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: center;
    }

    .intro-box, .auth-box, .shell, .card, .sidebar {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .intro-box {
      padding: 48px;
      min-height: 420px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand {
      font-size: 54px;
      font-weight: 800;
      color: var(--primary);
      margin: 0 0 8px 0;
    }

    .sub {
      color: var(--muted);
      font-size: 23px;
      margin-bottom: 30px;
    }

    .feature {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .feature-icon {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      background: #eef0ff;
      color: var(--primary);
      display: grid;
      place-items: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .feature h3 {
      margin: 0 0 4px 0;
      font-size: 22px;
    }

    .feature p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
    }

    .auth-box {
      padding: 32px;
      max-width: 480px;
      width: 100%;
      justify-self: center;
    }

    .auth-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .auth-tab {
      flex: 1;
      padding: 12px;
      border-radius: 14px;
      text-align: center;
      cursor: pointer;
      font-weight: 700;
      border: 1px solid var(--line);
      background: #f7f8fd;
    }

    .auth-tab.active {
      background: linear-gradient(90deg, var(--primary), var(--primary-2));
      color: #fff;
      border-color: transparent;
    }

    .auth-box h2 {
      margin: 0 0 8px 0;
      font-size: 34px;
      text-align: center;
    }

    .auth-box .muted {
      text-align: center;
      margin-bottom: 18px;
    }

    input, textarea, select, button {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 14px 16px;
      font-size: 15px;
      font-family: inherit;
    }

    input, textarea, select {
      background: #fff;
      color: var(--text);
      margin-bottom: 12px;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    button {
      cursor: pointer;
      border: none;
      background: linear-gradient(90deg, var(--primary), var(--primary-2));
      color: white;
      font-weight: 700;
      transition: 0.2s;
    }

    button:hover { transform: translateY(-1px); }

    .secondary {
      background: #eef1f9;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .mini-btn {
      width: auto;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
    }

    .muted { color: var(--muted); }
    .danger { color: #ff6b6b; }
    .success { color: #29b36a; }
    .empty { color: var(--muted); font-size: 14px; }

    .app-wrap {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
      gap: 18px;
      padding: 18px;
    }

    .sidebar {
      background: var(--sidebar);
      padding: 18px;
      display: flex;
      flex-direction: column;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 22px;
      color: var(--primary);
    }

    .logo-box {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--blue-soft);
      display: grid;
      place-items: center;
      font-size: 22px;
    }

    .version-pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      margin-left: auto;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .menu-item {
      padding: 14px 16px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    .menu-item.active {
      background: #e7e9fb;
      color: var(--primary);
    }

    .menu-badge {
      margin-left: auto;
      min-width: 24px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--primary);
      display: inline-grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
    }

    .sidebar-actions {
      margin-top: auto;
      padding-top: 18px;
      border-top: 1px solid #dfe3f3;
    }

    .side-title {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      margin: 8px 0 14px;
      text-transform: uppercase;
    }

    .quick-btn {
      margin-bottom: 10px;
      border-radius: 16px;
      padding: 16px;
    }

    .quick-primary {
      background: linear-gradient(90deg, var(--primary), var(--primary-2));
      color: #fff;
    }

    .shell { overflow: hidden; }

    .topbar {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      background: #fff;
    }

    .profile-box {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(90deg, var(--primary), var(--primary-2));
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .profile-meta strong { display: block; }
    .profile-meta span { color: var(--muted); font-size: 14px; }

    .content {
      padding: 24px;
      background: #fff;
    }

    .tab-page { display: none; }
    .tab-page.active { display: block; }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 8px 0;
      font-size: 36px;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .goal-card {
      min-width: 320px;
      background: #f8f8ff;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .goal-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: #fff2d9;
      display: grid;
      place-items: center;
      font-size: 22px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e9ebf7;
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0 8px;
    }

    .progress-bar > div {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--primary-2));
      border-radius: 999px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 18px;
    }

    .stat-card {
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .stat-icon {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .blue-soft { background: var(--blue-soft); color: var(--primary); }
    .green-soft { background: var(--green-soft); color: var(--green); }
    .orange-soft { background: var(--orange-soft); color: var(--orange); }
    .red-soft { background: var(--red-soft); color: var(--red); }

    .stat-title {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 2px;
    }

    .stat-sub {
      color: var(--muted);
      font-size: 14px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .grid-bottom {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .card { padding: 20px; }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .card-head h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .link-action {
      color: var(--primary);
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }

    .note-item, .subject-item, .saved-plan-item {
      border: 1px solid var(--line);
      background: #fafbff;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .note-item h4, .subject-item h4, .saved-plan-item h4 {
      margin: 0 0 6px 0;
      font-size: 16px;
    }

    .note-item p, .subject-item p, .saved-plan-item p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      white-space: pre-wrap;
    }

    .subject-progress {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .subject-progress .progress-bar {
      margin: 0;
      flex: 1;
      height: 7px;
    }

    .subject-progress strong {
      min-width: 44px;
      text-align: right;
      font-size: 14px;
    }

    .subject-actions, .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .row > * { flex: 1; min-width: 140px; }

    .file-label {
      display: inline-block;
      width: 100%;
      padding: 12px 14px;
      background: #f7f8fc;
      border: 1px dashed #ccd3ea;
      border-radius: 14px;
      color: var(--muted);
      cursor: pointer;
      text-align: center;
      margin-bottom: 12px;
    }

    .priority-card {
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
      border: 1px solid var(--line);
    }

    .priority-90 { background: #fff1f1; border-left: 6px solid #ff6b6b; }
    .priority-70 { background
