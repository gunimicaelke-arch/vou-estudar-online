services:
  - type: web
    name: vou-estudar-online
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        value: '*'
      - key: DEFAULT_MODEL
        value: gpt-4.1-mini
