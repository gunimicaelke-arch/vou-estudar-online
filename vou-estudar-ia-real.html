<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vou Estudar+ | Sistema Unificado</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #07111f;
  color: #fff;
}

.container {
  padding: 20px;
}

h1 {
  text-align: center;
  color: #00d4ff;
}

.card {
  background: #0d1b31;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
}

input, textarea, select, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #00d4ff;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00aacc;
}

.lista {
  margin-top: 10px;
}

.item {
  background: #112244;
  padding: 10px;
  border-radius: 10px;
  margin-top: 8px;
}
</style>
</head>

<body>

<div class="container">

<h1>📘 Vou Estudar+</h1>

<!-- IA -->
<div class="card">
<h2>🤖 Estudar com IA</h2>

<textarea id="conteudo" placeholder="Cole seu conteúdo aqui..."></textarea>

<button onclick="analisar()">📊 Analisar Conteúdo</button>
<button onclick="gerarPlano()">📅 Gerar Plano</button>

<div id="respostaIA"></div>
</div>

<!-- Trabalhos -->
<div class="card">
<h2>📋 Gestão de Trabalhos</h2>

<input id="materia" placeholder="Matéria">
<input id="titulo" placeholder="Título do trabalho">
<input type="date" id="data">
<input type="time" id="hora">
<input type="file" id="arquivo">

<button onclick="salvarTrabalho()">💾 Salvar Trabalho</button>

<div class="lista" id="listaTrabalhos"></div>
</div>

</div>

<script>

const API = "/api/study-ai";

async function analisar() {
  const conteudo = document.getElementById("conteudo").value;

  const res = await fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      mode: "analyze",
      conteudo
    })
  });

  const data = await res.json();
  document.getElementById("respostaIA").innerText = data.resultado || "Erro";
}

async function gerarPlano() {
  const conteudo = document.getElementById("conteudo").value;

  const res = await fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      mode: "plan",
      conteudo
    })
  });

  const data = await res.json();
  document.getElementById("respostaIA").innerText = data.resultado || "Erro";
}

function salvarTrabalho() {
  const materia = document.getElementById("materia").value;
  const titulo = document.getElementById("titulo").value;
  const data = document.getElementById("data").value;
  const hora = document.getElementById("hora").value;
  const arquivo = document.getElementById("arquivo").files[0];

  const trabalho = {
    materia,
    titulo,
    data,
    hora,
    arquivo: arquivo ? arquivo.name : ""
  };

  let lista = JSON.parse(localStorage.getItem("trabalhos") || "[]");
  lista.push(trabalho);
  localStorage.setItem("trabalhos", JSON.stringify(lista));

  carregar();
}

function carregar() {
  const lista = JSON.parse(localStorage.getItem("trabalhos") || "[]");
  const div = document.getElementById("listaTrabalhos");

  div.innerHTML = "";

  lista.forEach((t, i) => {
    div.innerHTML += `
      <div class="item">
        <b>${t.titulo}</b><br>
        📘 ${t.materia}<br>
        📅 ${t.data} ⏰ ${t.hora}<br>
        📎 ${t.arquivo}
        <br><br>
        <button onclick="remover(${i})">❌ Remover</button>
      </div>
    `;
  });
}

function remover(i) {
  let lista = JSON.parse(localStorage.getItem("trabalhos") || "[]");
  lista.splice(i,1);
  localStorage.setItem("trabalhos", JSON.stringify(lista));
  carregar();
}

carregar();

</script>

</body>
</html>
